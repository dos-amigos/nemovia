name: Scrape External Sources

on:
  schedule:
    # Facebook scraper: daily at 08:00 UTC
    - cron: '0 8 * * *'
    # Tavily discovery: daily at 10:00 UTC (50 searches/run, ~1500/month within 1000 free credits with headroom)
    - cron: '0 10 * * *'
    # Instagram/Apify: 2x/week (Mon+Thu at 09:00 UTC) — saves Apify credits
    - cron: '0 9 * * 1,4'
    # CulturaVeneto: 2x/week (Mon+Thu at 07:00 UTC)
    - cron: '0 7 * * 1,4'
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to run'
        required: true
        type: choice
        options:
          - all
          - facebook
          - tavily
          - instagram
          - culturaveneto

jobs:
  scrape-facebook:
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.script == 'all' || github.event.inputs.script == 'facebook')
      || github.event_name == 'schedule' && github.event.schedule == '0 8 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: node scripts/scrape-facebook.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  discover-tavily:
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.script == 'all' || github.event.inputs.script == 'tavily')
      || github.event_name == 'schedule' && github.event.schedule == '0 10 */3 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: node scripts/discover-tavily.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TAVILY_API: ${{ secrets.TAVILY_API }}

  scrape-instagram:
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.script == 'all' || github.event.inputs.script == 'instagram')
      || github.event_name == 'schedule' && github.event.schedule == '0 9 * * 1,4'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: node scripts/scrape-instagram.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API: ${{ secrets.APIFY_API }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  scrape-culturaveneto:
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.script == 'all' || github.event.inputs.script == 'culturaveneto')
      || github.event_name == 'schedule' && github.event.schedule == '0 7 * * 1,4'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: node scripts/scrape-culturaveneto.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
